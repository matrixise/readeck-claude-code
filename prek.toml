# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.12"
hooks = [
    { id = "ruff", args = ["--fix"] },
    { id = "ruff-format" },
]

[[repos]]
repo = "https://github.com/pre-commit/mirrors-mypy"
rev = "v1.10.1"
hooks = [
    { id = "mypy", entry = "mypy src/", args = ["--explicit-package-bases"], pass_filenames = false, files = "^src/", additional_dependencies = [
        "pydantic",
        "tomli-w",
        "types-toml",
        "httpx",
        "typer",
        "rich",
    ] },
]

[[repos]]
repo = "local"
hooks = [
    { id = "ty", name = "ty type check", entry = "uv run ty check src/", language = "system", pass_filenames = false, types = ["python"] },
    { id = "pyupgrade", name = "pyupgrade", entry = "uv run pyupgrade --py313-plus", language = "system", types = ["python"] },
]
